name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, format check, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build check
        run: uv build

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run ruff lint check
        run: uv run ruff check

      - name: Run pytest with coverage
        run: uv run pytest --cov=src/dictk --cov-report=xml --cov-report=html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-coverage
          path: |
            htmlcov/
            coverage.xml

  docs:
    name: Build and deploy docs (mdBook + pdoc)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Download coverage report from test job
        uses: actions/download-artifact@v4
        with:
          name: report-coverage
          path: coverage-report

      - name: Generate coverage badge
        run: uv run genbadge coverage -i coverage-report/coverage.xml -o coverage-badge.svg

      - name: Run pylint (informational) and generate lint badge/report
        # pylint is not a CI gate — ruff (format + lint) already gated this
        # job via needs: test. pylint runs here purely to produce a 0-10
        # score (a metric ruff has no equivalent of) for the README badge,
        # plus a full findings report. `|| true`: a nonzero pylint exit code
        # (e.g. any convention/refactor finding) must not fail this job.
        run: |
          LINT_OUTPUT=$(uv run pylint src/dictk --output-format=text --reports=yes || true)
          echo "$LINT_OUTPUT" > pylint-report.txt
          SCORE=$(echo "$LINT_OUTPUT" | grep "Your code has been rated at" | awk '{print $7}' | cut -d'/' -f1)
          echo "pylint score: ${SCORE}/10"

          COLOR=$(awk -v s="$SCORE" 'BEGIN {
            if (s >= 9) print "brightgreen";
            else if (s >= 7) print "green";
            else if (s >= 5) print "yellowgreen";
            else if (s >= 3) print "yellow";
            else if (s >= 1) print "orange";
            else print "red";
          }')
          curl -s -o lint-badge.svg "https://img.shields.io/badge/pylint-${SCORE}%2F10-${COLOR}.svg"

          uv run python .github/scripts/render_pylint_report.py \
            --input pylint-report.txt --output pylint-report.html

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          # Pinned to 0.4.52: mdbook-cmdrun (below) depends on the mdbook
          # crate's 0.4.x preprocessor JSON schema, which changed in mdbook
          # 0.5. See https://github.com/FauconFan/mdbook-cmdrun/issues/22.
          mdbook-version: "0.4.52"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/bin
          key: cargo-mdbook-cmdrun-${{ runner.os }}

      - name: Install mdbook-cmdrun
        # --force: ~/.cargo/bin is cached (see above), so a cache hit means
        # the binary is already present and a plain `cargo install` errors
        # with "binary already exists in destination".
        run: cargo install mdbook-cmdrun --locked --force

      - name: Build user guide
        # mdbook-cmdrun resolves each cmdrun command's working directory
        # relative to the process cwd, so this must run from inside
        # docs/userguide (matching `book.src = "src"` in book.toml), not as
        # `mdbook build docs/userguide` from the repo root.
        run: cd docs/userguide && uv run --project ../.. mdbook build

      - name: Build API docs
        # dictk.core/imaging/cli must be listed explicitly: pdoc's automatic
        # submodule discovery respects a package's __all__, and only rosta
        # is exported there — see CONTRIBUTING.md#building-the-api-docs.
        run: uv run pdoc dictk dictk.core dictk.imaging dictk.cli -o docs/api

      - name: Generate status dashboard
        run: |
          uv run python .github/scripts/render_dashboard.py \
            --github-repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --sha "${{ github.sha }}" \
            --ref-name "${{ github.ref_name }}" \
            --timestamp "$(date -u +"%Y-%m-%d %H:%M:%S UTC")" \
            --output dashboard.html

      - name: Assemble combined site
        # mdBook, pdoc, the coverage report, and the pylint report each produce
        # standalone output; peaceiris/actions-gh-pages replaces the whole
        # publish_dir contents on deploy, so all of them must be staged under
        # one directory (API docs at /api/, badges at /badges/, coverage report
        # at /coverage/, lint report at /reports/lint/, dashboard at
        # /dashboard/) rather than deployed separately, or each deploy would
        # wipe out the previous one.
        run: |
          mkdir -p site
          cp -r docs/userguide/book/. site/
          mkdir -p site/api
          cp -r docs/api/. site/api/
          mkdir -p site/badges
          cp coverage-badge.svg site/badges/coverage.svg
          cp lint-badge.svg site/badges/lint.svg
          mkdir -p site/coverage
          cp -r coverage-report/htmlcov/. site/coverage/
          mkdir -p site/reports/lint
          cp pylint-report.html site/reports/lint/index.html
          mkdir -p site/dashboard
          cp dashboard.html site/dashboard/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site

  release:
    name: Publish release
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (contains(github.event.head_commit.message, '[pypi]') ||
       contains(github.event.head_commit.message, '[testpypi]'))
    permissions:
      id-token: write
    environment:
      name: ${{ contains(github.event.head_commit.message, '[pypi]') && 'pypi' || 'testpypi' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Build distribution
        run: uv build

      - name: Publish to TestPyPI
        if: contains(github.event.head_commit.message, '[testpypi]') && !contains(github.event.head_commit.message, '[pypi]')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: contains(github.event.head_commit.message, '[pypi]')
        uses: pypa/gh-action-pypi-publish@release/v1
